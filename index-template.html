<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chats — An archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4ede0;
      --paper-deep: #ece2cc;
      --ink: #1c1814;
      --ink-soft: #5c5147;
      --ink-faded: #8a7c6d;
      --rule: #c9b896;
      --accent: #8b3a1a;
      --hover-bg: #ece1c8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: var(--paper); color: var(--ink); }

    body {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 19px;
      line-height: 1.65;
      padding: 5rem 1.5rem 4rem;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at top, rgba(139, 58, 26, 0.04), transparent 60%),
        radial-gradient(ellipse at bottom, rgba(28, 24, 20, 0.03), transparent 60%);
    }

    .page { max-width: 680px; margin: 0 auto; }

    header {
      text-align: center;
      margin-bottom: 4rem;
      padding-bottom: 2.5rem;
      position: relative;
    }

    header::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: var(--rule);
    }

    header .eyebrow {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-faded);
      margin-bottom: 1rem;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 350;
      font-size: clamp(2.4rem, 6vw, 3.5rem);
      font-variation-settings: "opsz" 144, "SOFT" 60;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--ink);
    }

    header .count {
      margin-top: 1rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink-faded);
      letter-spacing: 0.05em;
    }

    .entries {
      list-style: none;
    }

    .entry {
      border-bottom: 1px solid var(--rule);
    }

    .entry:first-child {
      border-top: 1px solid var(--rule);
    }

    .entry-link {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 2rem;
      padding: 1.4rem 0.75rem;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.2s ease, padding 0.2s ease;
    }

    .entry-link:hover {
      background: var(--hover-bg);
      padding-left: 1.25rem;
    }

    .entry-title {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 1.25rem;
      font-variation-settings: "opsz" 60;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--ink);
      flex: 1;
    }

    .entry-link:hover .entry-title { color: var(--accent); }

    .entry-date {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      color: var(--ink-faded);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .entry.empty {
      padding: 2rem 0.75rem;
      text-align: center;
      font-style: italic;
      color: var(--ink-faded);
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--ink-faded);
    }

    footer::before {
      content: "❦";
      display: block;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      font-style: normal;
      color: var(--rule);
    }

    @media (max-width: 480px) {
      .entry-link { flex-wrap: wrap; gap: 0.5rem; }
      .entry-date { font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="eyebrow">An archive</div>
      <h1>Chats</h1>
      <div class="count">{{COUNT}} entries</div>
    </header>

    <ul class="entries">
{{ENTRIES}}
    </ul>

    <footer>Built {{BUILD_DATE}}</footer>
  </div>
</body>
</html>
